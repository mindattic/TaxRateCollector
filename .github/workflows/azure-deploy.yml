name: Build and deploy TaxRateCollector to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore TaxRateCollector.Frontend/TaxRateCollector.Frontend.csproj

      - name: Build
        run: dotnet build TaxRateCollector.Frontend/TaxRateCollector.Frontend.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test TaxRateCollector.UnitTests/TaxRateCollector.UnitTests.csproj --no-build --filter "Category!=Integration" -v m

      - name: Publish
        run: dotnet publish TaxRateCollector.Frontend/TaxRateCollector.Frontend.csproj -c Release -o publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taxratecollector-app
          path: publish/

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: taxratecollector-app
          path: publish/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: taxratecollector
          slot-name: Production
          package: publish/
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
